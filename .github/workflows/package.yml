name: Package

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: Package app
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Package app
        run: ./package.sh

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: turtlemeck-package
          path: |
            .build/turtlemeck.zip
            .build/turtlemeck.dmg
            .build/SHA256SUMS
          if-no-files-found: error
          include-hidden-files: true
