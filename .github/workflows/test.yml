name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Swift tests
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: Tests/run.sh
